<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="LLM Fusion — a local, self-hosted take on Devin Fusion">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#010409"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3fb950"/>
      <stop offset="0.5" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#f78166"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="340" fill="url(#bg)"/>
  <rect width="1200" height="4" fill="url(#edge)"/>

  <!-- brand mark -->
  <g transform="translate(72,86)">
    <circle cx="34" cy="34" r="34" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <path d="M22 26 l12 8 l-12 8 M38 42 h14" fill="none" stroke="#3fb950" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- wordmark -->
  <text x="164" y="118" font-size="52" font-weight="700" fill="#e6edf3" letter-spacing="-0.5">LLM Fusion</text>
  <text x="166" y="156" font-size="20" fill="#7d8590">A local, self-hosted take on Devin Fusion</text>

  <!-- tagline -->
  <text x="166" y="210" font-size="17" fill="#adbac7">Give it a goal. It classifies, routes to the cheapest capable model,</text>
  <text x="166" y="234" font-size="17" fill="#adbac7">verifies the result, and escalates on failure — in live terminals.</text>

  <!-- chips -->
  <g font-size="13" font-weight="600">
    <g transform="translate(166,262)">
      <rect width="118" height="30" rx="15" fill="#161b22" stroke="#30363d"/>
      <circle cx="18" cy="15" r="4" fill="#3fb950"/>
      <text x="32" y="19" fill="#adbac7">autopilot</text>
    </g>
    <g transform="translate(296,262)">
      <rect width="150" height="30" rx="15" fill="#161b22" stroke="#30363d"/>
      <circle cx="18" cy="15" r="4" fill="#58a6ff"/>
      <text x="32" y="19" fill="#adbac7">cost benchmark</text>
    </g>
    <g transform="translate(458,262)">
      <rect width="132" height="30" rx="15" fill="#161b22" stroke="#30363d"/>
      <circle cx="18" cy="15" r="4" fill="#f78166"/>
      <text x="32" y="19" fill="#adbac7">local &amp; private</text>
    </g>
  </g>

  <!-- right-side route panel -->
  <g transform="translate(760,74)">
    <rect width="376" height="192" rx="10" fill="#161b22" stroke="#30363d"/>

    <text x="20" y="34" font-size="13" font-weight="600" fill="#7d8590" letter-spacing="0.4">ROUTING LADDER</text>

    <!-- goal -->
    <g transform="translate(20,50)">
      <rect width="336" height="32" rx="6" fill="#0d1117" stroke="#30363d"/>
      <text x="14" y="21" font-size="14" fill="#adbac7">goal → classify</text>
    </g>

    <!-- cheap -->
    <g transform="translate(20,94)">
      <rect width="336" height="30" rx="6" fill="#0d1117" stroke="#238636"/>
      <circle cx="16" cy="15" r="5" fill="#3fb950"/>
      <text x="32" y="20" font-size="14" fill="#e6edf3" font-weight="600">cheap</text>
      <text x="110" y="20" font-size="13" fill="#7d8590">sidekick model · verify ✓</text>
    </g>

    <!-- escalate -->
    <g transform="translate(20,130)">
      <rect width="336" height="30" rx="6" fill="#0d1117" stroke="#30363d"/>
      <circle cx="16" cy="15" r="5" fill="#d29922"/>
      <text x="32" y="20" font-size="14" fill="#e6edf3" font-weight="600">frontier</text>
      <text x="122" y="20" font-size="13" fill="#7d8590">escalate on failure</text>
    </g>

    <!-- fusion -->
    <g transform="translate(20,166)">
      <text x="0" y="6" font-size="13" fill="#7d8590">…or</text>
      <g transform="translate(36,-11)">
        <rect width="300" height="24" rx="6" fill="#0d1117" stroke="#1f6feb"/>
        <circle cx="14" cy="12" r="5" fill="#58a6ff"/>
        <text x="28" y="16" font-size="13" fill="#adbac7"><tspan fill="#e6edf3" font-weight="600">fusion</tspan> · plan → delegate → review</text>
      </g>
    </g>
  </g>
</svg>
